<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Mini Site</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#ECF0F1;
}



header{
background:#2C3E50;
color:white;
padding:20px;
text-align:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#E67E22;
}



.container{
display:flex;
padding:20px;
gap:20px;
}



section{
flex:3;
background:white;
padding:20px;
border-radius:8px;
}



aside{
flex:1;
background:#3498DB;
color:white;
padding:20px;
border-radius:8px;
}


button{
background:#2ECC71;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#27AE60;
}


.link{
display:block;
margin-top:10px;
color:#3498DB;
text-decoration:none;
}


footer{
background:#2C3E50;
color:white;
text-align:center;
padding:15px;
margin-top:20px;
}

</style>

</head>

<body>

<header>
<h1>Meu Mini Site</h1>

<nav>
<a href="#">Home</a>
<a href="#">Sobre</a>
<a href="#">Contato</a>
</nav>

</header>

<div class="container">

<section>

<h2>Conteúdo Principal</h2>

<p>
Este é um mini site criado com HTML e CSS utilizando uma paleta de cores harmoniosa.
</p>

<a class="link" href="#">Leia mais</a>

<br>

<button>Saiba Mais</button>

</section>

<aside>

<h3>Barra Lateral</h3>

<p>Links rápidos:</p>

<a class="link" href="#">Artigo 1</a>
<a class="link" href="#">Artigo 2</a>
<a class="link" href="#">Artigo 3</a>

</aside>

</div>

<footer>

<p>© 2026 - Mini Site Exemplo</p>

</footer>

</body>
</html>
