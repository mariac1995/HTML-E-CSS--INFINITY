<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Flexbox - Caixas Centralizadas</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
}

/* CONTÊINER FLEX */

.container{
    display:flex;
    justify-content:center;   /* centraliza horizontalmente */
    align-items:center;       /* centraliza verticalmente */
    min-height:100vh;         /* altura mínima para visualizar o alinhamento */
    background:#f0f2f5;
    gap:20px;
}

/* CAIXAS */

.box{
    width:120px;
    height:120px;
    background:#3498db;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<div class="box">1</div>
<div class="box">2</div>
<div class="box">3</div>

</div>

</body>
</html>
