<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Formulário Responsivo</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, sans-serif;
margin:0;
padding:0;
}

body{
background:#f2f4f7;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

/* FORMULÁRIO */

.form-container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
width:400px;
}

/* CAMPOS */

.input-group{
position:relative;
margin-bottom:20px;
}

.input-group input{
width:100%;
padding:10px 10px 10px 35px;
border-radius:8px;
border:1px solid #ccc;
}

/* ÍCONES COM BEFORE */

.input-group.username::before{
content:"👤";
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
}

.input-group.password::before{
content:"🔒";
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
}

/* BOTÕES */

.buttons{
display:flex;
gap:10px;
}

button{
position:relative;
flex:1;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#3498db;
color:white;
font-weight:bold;
overflow:hidden;
}

/* EFEITO AFTER */

button::after{
content:"";
position:absolute;
left:0;
bottom:0;
width:0;
height:3px;
background:#2ecc71;
transition:0.3s;
}

button:hover::after{
width:100%;
}

/* BOTÃO LIMPAR */

.reset{
background:#e74c3c;
}

/* RESPONSIVIDADE */

/* MOBILE */

@media (max-width:600px){

.form-container{
width:100%;
margin:20px;
}

}

/* TABLET */

@media (min-width:601px) and (max-width:900px){

.form-container{
width:70%;
}

}

/* DESKTOP */

@media (min-width:901px){

.form-container{
width:400px;
}

}

</style>
</head>

<body>

<div class="form-container">

<h2>Login</h2>

<form>

<div class="input-group username">
<input type="text" placeholder="Nome de Usuário">
</div>

<div class="input-group password">
<input type="password" placeholder="Senha">
</div>

<div class="buttons">
<button type="submit">Enviar</button>
<button type="reset" class="reset">Limpar</button>
</div>

</form>

</div>

</body>
</html>
